name: bench

on:
  pull_request:
    paths:
      - "crates/copium-core/src/transforms/quality_gate/**"
      - "crates/copium-core/src/transforms/simhash.rs"
      - "crates/copium-core/src/transforms/code_analyzer.rs"
      - "crates/copium-core/src/transforms/pipeline/**"
      - "crates/copium-core/benches/**"
      - ".github/workflows/bench.yml"
  push:
    branches: [main]
    paths:
      - "crates/copium-core/src/transforms/quality_gate/**"
      - "crates/copium-core/benches/**"
      - ".github/workflows/bench.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: ROUGE-L benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: cargo bench -p copium-core --bench rouge_l -- --output-format bencher | tee bench_output.txt

      - name: Post results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bench = fs.readFileSync('bench_output.txt', 'utf8');
            const body = `## Benchmark Results (ROUGE-L)\n\n\`\`\`\n${bench}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
