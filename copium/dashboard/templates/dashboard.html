<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copium</title>
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <script>
        (function() {
            const saved = localStorage.getItem('copium-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'light' || (!saved && !prefersDark)) {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Inter:wght@400;500&display=swap');

        :root {
            --bg: #ffffff;
            --fg: #000000;
            --muted: #888888;
            --border: #e5e5e5;
            --surface: #fafafa;
            --inverted-bg: #000000;
            --inverted-fg: #ffffff;
        }
        html.dark {
            --bg: #000000;
            --fg: #ffffff;
            --muted: #888888;
            --border: #222222;
            --surface: #0a0a0a;
            --inverted-bg: #ffffff;
            --inverted-fg: #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace; }
        .label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }
        .number {
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
            font-weight: 300;
            line-height: 1;
            font-size: 72px;
            color: var(--fg);
            font-variant-numeric: tabular-nums;
        }
        .metric { text-align: center; }
        .metric .label { margin-bottom: 8px; }
        .metric .number { margin-bottom: 4px; }
        .metric .unit {
            font-size: 14px;
            color: var(--muted);
            font-weight: 400;
        }
        .action-box {
            background: var(--inverted-bg);
            color: var(--inverted-fg);
            padding: 16px 24px;
            font-size: 14px;
            line-height: 1.5;
            text-align: center;
        }
        .action-box button {
            background: none;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .action-box button:hover { opacity: 0.7; }
        .version {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        .theme-toggle:hover { color: var(--fg); border-color: var(--fg); }
    </style>
</head>
<body x-data="dashboard()" x-init="init()">
    <header style="padding: 24px 32px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: baseline; gap: 12px;">
            <span style="font-size: 14px; font-weight: 500; letter-spacing: 0.1em;">COPIUM</span>
            <span class="version" x-text="'v' + version"></span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <span class="label" x-text="lastUpdate"></span>
            <button class="theme-toggle" @click="toggleTheme()">theme</button>
        </div>
    </header>

    <main style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 32px; max-width: 640px; margin: 0 auto; width: 100%;">

        <div class="metric" style="margin-bottom: 80px;">
            <div class="label">Total Dollars Saved</div>
            <div class="number" x-text="'$' + formatCurrency(dollarsSaved)"></div>
        </div>

        <div class="metric" style="margin-bottom: 80px;">
            <div class="label">Compression Ratio</div>
            <div class="number" x-text="compressionRatio.toFixed(1) + '%'"></div>
        </div>

        <div class="metric" style="margin-bottom: 80px;">
            <div class="label">Tokens Per Minute</div>
            <div class="number" x-text="formatNumber(burnRate)"></div>
        </div>

        <div x-show="actionText" style="width: 100%; margin-bottom: 40px;">
            <div class="action-box">
                <span x-text="actionText"></span>
                <template x-if="actionButton">
                    <button x-text="actionButton" @click="handleAction()"></button>
                </template>
            </div>
        </div>

    </main>

    <footer style="padding: 24px 32px; text-align: center;">
        <span class="label">Press R to refresh</span>
    </footer>

    <script>
        function dashboard() {
            return {
                version: '0.26.0',
                lastUpdate: 'never',
                dollarsSaved: 0,
                compressionRatio: 0,
                burnRate: 0,
                actionText: '',
                actionButton: '',
                pollInterval: null,

                async init() {
                    await this.fetchStats();
                    this.pollInterval = setInterval(() => this.fetchStats(), 5000);
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'r' || e.key === 'R') this.fetchStats();
                    });
                },

                async fetchStats() {
                    try {
                        const res = await fetch('/stats?cached=1');
                        const data = await res.json();
                        this.dollarsSaved = data.persistent_savings?.lifetime?.compression_savings_usd || 0;
                        this.compressionRatio = data.tokens?.savings_percent || 0;
                        this.burnRate = data.throughput?.current?.input_active_p50 || 0;
                        this.version = (await (await fetch('/health')).json()).version || '0.26.0';
                        this.lastUpdate = new Date().toLocaleTimeString();
                        this.computeAction(data);
                    } catch (e) {
                        console.error('Stats fetch failed:', e);
                    }
                },

                computeAction(data) {
                    const signals = data.waste_signals || {};
                    const total = Object.values(signals).reduce((a, b) => a + b, 0);
                    const top = Object.entries(signals).sort((a, b) => b[1] - a[1])[0];
                    if (top && total > 0 && (top[1] / total) > 0.14) {
                        this.actionText = this.wasteLabel(top[0]) + ' is wasting tokens.';
                        this.actionButton = 'Trim';
                        return;
                    }
                    const decay = data.memory_decay || {};
                    if ((decay.expired_pending_gc || 0) > 0) {
                        this.actionText = decay.expired_pending_gc + ' stale memories purged.';
                        this.actionButton = '';
                        return;
                    }
                    this.actionText = '';
                    this.actionButton = '';
                },

                wasteLabel(signal) {
                    const labels = {
                        'frozen_prefix': 'Frozen prefix',
                        'repeated_tool_output': 'Repeated tool output',
                        'verbose_assistant': 'Verbose assistant turns',
                        'system_prompt_bloat': 'System prompt bloat',
                        'image_payload': 'Image payloads',
                    };
                    return labels[signal] || signal.replace(/_/g, ' ');
                },

                handleAction() {
                    // Placeholder for future trim action
                },

                formatNumber(n) {
                    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
                    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
                    return n.toString();
                },

                formatCurrency(n) {
                    if (n < 0) return '-' + this.formatCurrency(-n);
                    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
                    if (n >= 1) return n.toFixed(2);
                    if (n >= 0.01) return n.toFixed(3);
                    if (n > 0) return n.toFixed(4);
                    return '0.00';
                },

                toggleTheme() {
                    const isDark = document.documentElement.classList.toggle('dark');
                    localStorage.setItem('copium-theme', isDark ? 'dark' : 'light');
                },
            };
        }
    </script>
</body>
</html>
